<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tarefas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="main.css">
</head>

<body>
    <header>
        <h1>Lista de tarefas</h1>
        <button type="button">Nova tarefa +</button>
    </header>
    <form>
        <h2>Adicionar nova tarefa</h2>
    </form>
    <main class="container">
        <form id="form-tarefas">
            <input type="text" id="nova-tarefa" required placeholder="Nova Tarefa" />
            <button type="submit">
                Adicionar
            </button>
            <button type="button" id="limpar-itens">
                Limpar lista
            </button>
            <button type="reset" id="bt-cancelar">X</button>
        </form>
        <section id="container-tarefas">
            <h1>Tarefas</h1>
            <div class="content">
                <ul>
                    
                    <li>
                    </li>
                </ul>
            </div>
        </section>
    </main>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="main.js"></script>
</body>

</html>
